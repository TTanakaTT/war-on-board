<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />

    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
      (() => {
        const themeStorageKey = "war-on-board-theme";
        const storedThemePreference = localStorage.getItem(themeStorageKey);
        const themePreference =
          storedThemePreference === "light" || storedThemePreference === "dark"
            ? storedThemePreference
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.classList.toggle("dark", themePreference === "dark");
        document.documentElement.style.colorScheme = themePreference;
      })();
    </script>

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
